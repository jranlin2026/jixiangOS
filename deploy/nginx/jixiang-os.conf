server {
    listen 80;
    server_name crm.example.com;

    # Enable this after DNS points to the server and Certbot has issued a certificate.
    # return 301 https://$host$request_uri;

    root /var/www/jixiang-os/current/dist;
    index index.html;

    client_max_body_size 20m;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS template after running:
# certbot --nginx -d crm.example.com
#
# Keep the Certbot-managed SSL directives, and make sure the HTTPS server has
# the same root, /api proxy, and SPA fallback blocks above.
